<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atlas Imager — Raul Ramirez</title>
  </head>
  <body>
    <div id="layout">
      <nav id="sidebar">
        <button id="sidebar-toggle" aria-label="Toggle sidebar">
          <svg class="toggle-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15,18 9,12 15,6"></polyline>
          </svg>
        </button>

        <ul class="nav-links">
          <li>
            <a href="/" class="nav-link" aria-label="Home">
              <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9,22 9,12 15,12 15,22"></polyline>
              </svg>
              <span class="nav-label">Home</span>
            </a>
          </li>
          <li>
            <a href="/about.html" class="nav-link" aria-label="About Me">
              <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
              <span class="nav-label">About Me</span>
            </a>
          </li>
          <li>
            <a href="/atlas.html" class="nav-link active" aria-label="Atlas Imager">
              <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="12,2 2,7 12,12 22,7"></polygon>
                <polyline points="2,17 12,22 22,17"></polyline>
                <polyline points="2,12 12,17 22,12"></polyline>
              </svg>
              <span class="nav-label">Atlas Imager</span>
            </a>
          </li>
        </ul>
      </nav>

      <!-- Renderer — canvas fills the entire centre column -->
      <main id="renderer">
        <canvas id="atlas-canvas" aria-label="Atlas Imager viewport"></canvas>
      </main>

      <!-- Right controls sidebar -->
      <aside id="controls-panel">
        <button id="controls-toggle" aria-label="Toggle controls panel">
          <!-- chevron-right: default icon when panel is expanded -->
          <svg class="controls-toggle-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9,18 15,12 9,6"></polyline>
          </svg>
        </button>

        <div class="controls-content">
          <p id="atlas-status" aria-live="polite">Loading WebAssembly module…</p>

          <!-- User image upload -->
          <div class="control-group">
            <label for="user-image-input">X-Ray Image</label>
            <input type="file" id="user-image-input" accept=".tif,.tiff" />
          </div>

          <!-- Dataset selection -->
          <div class="control-group">
            <span class="control-label">Dataset</span>
            <button id="btn-load-lgn">Load LGN</button>
            <button id="btn-load-pag">Load PAG</button>
          </div>

          <!-- Viewer controls (revealed after WASM loads) -->
          <div class="control-group" id="viewer-controls" style="display:none">
            <span class="control-label">Navigation</span>
            <button id="btn-prev">&#8592; Prev</button>
            <button id="btn-next">Next &#8594;</button>
            <button id="btn-reset">Reset</button>
            <label class="range-label">
              Opacity
              <input type="range" id="slider-opacity" min="0" max="100" value="75" />
            </label>
          </div>
        </div>
      </aside>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
